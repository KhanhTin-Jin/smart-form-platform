version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartform_db
    environment:
      POSTGRES_DB: SmartFormDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: smartform_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5282
      - AUTO_MIGRATE=true
      - AUTO_SEED=true
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=SmartFormDb;Username=postgres;Password=postgres
    ports:
      - "5282:5282"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: smartform_ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
